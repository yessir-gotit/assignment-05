<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issues Tracker</title>
    <link rel="stylesheet" href="styles.css">

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

    <!-- Tailwind & Daisy -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />

</head>
<body class="min-h-screen flex justify-center items-center bg-base-200">
    
    <div class="w-full max-w-[500px] p-5">
        
        <div class="bg-white rounded-2xl shadow-xl p-8 sm:p-10 w-full">
            
            <div class="flex justify-center mb-6">
                <img src="assets/github-logo.png" alt="GitHub Logo" class="w-16 h-16">
            </div>

            <h1 class="text-2xl font-bold text-center mb-1">
                GitHub Issues Tracker
            </h1>

            <p class="text-center mb-8 text-base-content/60">
                Sign in to manage your issues
            </p>

            <form>
                <div class="form-control mb-4">
                    <label class="label">
                        <span class="label-text font-medium">Username</span>
                    </label>
                    <input 
                        type="text" 
                        placeholder="Enter Username" 
                        class="input input-bordered w-full h-12 bg-base-100 border-base-300 focus:border-primary"
                        id="username"/>
                </div>

                <div class="form-control mb-6">
                    <label class="label">
                        <span class="label-text font-medium">Password</span>
                    </label>
                    <input 
                        type="password" 
                        placeholder="Enter Password" 
                        class="input input-bordered w-full h-12 bg-base-100 border-base-300 focus:border-primary"
                        id="password"
                    />
                </div>

                <button type="button" class="btn btn-primary w-full h-12 text-base font-medium" onclick="login()">
                    Sign In
                </button>
            </form>

            <div class="divider my-6">OR</div>

            <div class="bg-base-200 rounded-xl p-4">
                <p class="text-sm text-center text-gray-600 mb-3">
                    Demo Credentials
                </p>
                <div class="flex flex-col justify-center items-center text-sm gap-1">
                    <div>
                        <span class="text-base-content/50">Username:</span>
                        <span class="font-semibold text-black ">admin</span>
                    </div>
                    <div>
                        <span class="text-base-content/50">Password:</span>
                        <span class="font-semibold">admin123</span>
                    </div>
                </div>
            </div>

        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
