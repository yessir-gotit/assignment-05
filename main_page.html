<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Page - GitHub Issues Tracker</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="min-h-screen bg-base-200">

    <nav class="bg-white shadow-sm">
        <div class="w-full max-w-6xl mx-auto px-4 py-4 flex flex-col sm:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <img src="assets/github-logo.png" alt="GitHub Logo" class="w-10 h-10">
                <h1 class="text-xl font-bold">GitHub Issues Tracker</h1>
            </div>

            <div class="flex items-center gap-3 w-full sm:w-auto">
                <input type="text" placeholder="Search issues..." class="input input-bordered w-full sm:w-64 h-10" id="search"/>
                <button class="btn bg-[#4A00FF] hover:bg-[#5c1ff7] text-white border-none h-10">+ New Issue</button>
            </div>
        </div>
    </nav>
    
    <main class="w-full max-w-6xl mx-auto p-5">
        <div class="flex flex-wrap gap-2 mb-6 p-4 bg-white shadow-sm rounded-2xl" id="btn-category">
            <button class="btn btn-sm bg-[#4A00FF] text-white border-none px-10 text-[15px]" onclick="button(event)">All</button>
            <button class="btn btn-sm bg-white text-gray-700 border-gray-200 px-10 text-[15px]" onclick="button(event)">Open</button>
            <button class="btn btn-sm bg-white text-gray-700 border-gray-200 px-10 text-[15px]" onclick="button(event)">Closed</button>
        </div>

        <!-- Issue Head -->
        <div class="bg-white rounded-t-2xl shadow-xl p-6 sm:p-8">
            <div class="flex flex-col sm:flex-row justify-between items-start gap-4">
                <div class="flex items-center gap-4">
                    <div class="w-16 h-16 bg-[#ECE4FF] rounded-full flex justify-center items-center flex-shrink-0">
                        <img src="assets/Aperture.png" alt="Icon" class='w-8 h-8'>
                    </div>
                    <div>
                        <h2 class="text-2xl font-bold" id="issue-number"></h2>
                        <p class="text-gray-500">Track and manage your project issues</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Issue body -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 bg-gray-100 p-5 rounded-b-2xl border border-gray-100 border-t-0" id="issue-container">      
        </div>


        
    </main>
    

    <!-- Modal -->
        <dialog id="issue_modal" class="modal">
            <div class="modal-box bg-white rounded-2xl p-0 w-11/12 max-w-2xl shadow-2xl">
                <!-- modal Header -->
                <div class="p-6 ">
                    <div class="flex justify-between items-start gap-4">
                        <h3 class="text-2xl font-bold text-gray-900" id="modal-title">
                            Issue Title</h3>
                        
                    </div>
                    <p class="text-sm text-gray-500 mt-2 ">
                         <span id="modal-status" class="px-3 py-1  rounded-full text-xs font-semibold border border-green-100 uppercase"></span>
                        <span id="modal-author" class="font-medium text-gray-700">
                             Author Name
                        </span> on <span id="modal-date">Date</span>
                    </p>
                    
                    <div class="flex flex-wrap gap-2 mt-4" id="modal-labels">
 
                    </div>
                </div>
                <!-- Modal Body -->
                <div class="p-6 space-y-6">
                    <div>
                        <h4 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Description</h4>
                        <p class="text-gray-600 leading-relaxed text-sm" id="modal-description">

                        </p>
                    </div>


                    <!-- Modal footer -->
                    <div class="grid grid-cols-2 gap-6 bg-gray-50 p-4 rounded-xl">
                        <div>
                            <h4 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Assignee</h4>
                            <div class="flex items-center gap-2">
                                <span class="font-bold text-gray-800 text-sm capitalize" id="modal-assignee">
                                
                                </span>
                            </div>
                        </div>
                        <div>
                            <h4 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Priority</h4>
                            <span id="modal-priority" class="px-3 py-1 bg-red-50 text-red-600 rounded-full text-xs font-semibold border border-red-100 uppercase">
                            
                            </span>
                        </div>
                    </div>
                </div>

                <div class="p-6 border-t border-gray-100 flex justify-end">
                    <form method="dialog">
                        <button class="btn bg-[#A755F7] hover:bg-[#9644e0] text-white border-none px-6 shadow-md">
                            Close
                        </button>
                    </form>
                </div>
            </div>
            <form method="dialog" class="modal-backdrop">
                <button>close</button>
            </form>
        </dialog>   
    <script src="script.js"></script>
</body>
</html>
